ansparent),transparent 42%),var(--panel);border:1px solid color-mix(in srgb,var(--border) 88%,transparent);border-left:7px solid var(--showColor);border-radius:20px;padding:14px;box-shadow:var(--soft)}.ep:hover{border-color:color-mix(in srgb,var(--showColor) 70%,var(--border));transform:translateY(-1px)}.ep.watched{opacity:.63}.order{font-weight:950;color:white;background:linear-gradient(135deg,var(--showColor),color-mix(in srgb,var(--showColor) 68%,#000));border-radius:15px;padding:12px 8px;text-align:center;box-shadow:inset 0 1px rgba(255,255,255,.18),0 10px 20px color-mix(in srgb,var(--showColor) 20%,transparent)}.epArt{width:128px;height:78px;border-radius:15px;object-fit:cover;border:1px solid color-mix(in srgb,var(--showColor) 45%,var(--border));box-shadow:0 12px 24px rgba(0,0,0,.24);background:var(--panel2)}.ep h3{margin:0;font-size:18px;line-height:1.24;letter-spacing:-.015em}.meta{color:var(--muted);font-size:13px;margin-top:6px}.crossover{border-left:4px solid var(--warn);padding-left:10px;margin-top:9px;color:#facc15;font-size:13px}.statusBtns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.statusBtns button{padding:9px 10px;font-size:13px}.statusBtns .active{background:var(--showColor);color:white;border-color:transparent}.loadMore,.emptyState{justify-self:center;max-width:680px;width:100%;text-align:center}.bottomNav{position:fixed;bottom:0;left:0;right:0;display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);z-index:35;padding-top:1px}.bottomNav button{border-radius:0;border:0;padding:15px 5px;background:rgba(16,24,39,.96);backdrop-filter:blur(12px)}.light .bottomNav button{background:rgba(255,255,255,.96)}
.toastHost{position:fixed;right:16px;bottom:92px;z-index:100;display:grid;gap:10px;max-width:min(420px,calc(100vw - 32px))}.toast{border:1px solid var(--border);background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03)),var(--panel);border-left:5px solid var(--toastColor,var(--info));border-radius:16px;padding:13px 14px;box-shadow:var(--shadow);animation:toastIn .18s ease-out}.toast strong{display:block;margin-bottom:2px}.toast p{margin:0;color:var(--muted);font-size:14px}@keyframes toastIn{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.modalOverlay{position:fixed;inset:0;z-index:90;display:none;align-items:center;justify-content:center;padding:18px;background:rgba(0,0,0,.64);backdrop-filter:blur(7px)}.modalOverlay.show{display:flex}.modal{width:min(520px,100%);background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.02)),var(--panel);border:1px solid var(--border);border-radius:24px;padding:20px;box-shadow:var(--shadow)}.modal h2{margin:0 0 8px;font-size:22px}.modal p{color:var(--muted);line-height:1.5}.modalActions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;flex-wrap:wrap}.modalIcon{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;background:color-mix(in srgb,var(--modalColor,var(--brand)) 20%,transparent);color:white;border:1px solid color-mix(in srgb,var(--modalColor,var(--brand)) 45%,transparent);margin-bottom:12px}

<body>
  <header class="topbar">
    <div class="brandBlock"><div class="badgeLogo">WOLF</div><div><h1>Wolf Universe Watch Tracker</h1><p>Law & Order • One Chicago • FBI • crossovers • specials</p></div></div>
    <div class="topActions"><button id="syncNowBtn" class="primary smallBtn">Sync with Trakt</button><button id="themeBtn" class="ghost smallBtn">Theme</button></div>
  </header>

  <div class="appShell">
  <section class="dashboard dashboardV22">
    <div class="card hero" id="heroCard">
      <div class="heroText"><span class="label">Next episode</span><h2 id="nextTitle">Loading…</h2><div id="nextMeta" class="heroMeta"></div><p id="nextNotes" class="notes"></p><div class="heroBtns"><button id="markNextWatched" class="primary">Mark next watched</button><button id="jumpNext">Jump to next</button></div></div>
      <div class="posterWrap"><img id="nextPoster" alt="Show artwork" class="poster"></div>
    </div>
    <aside class="card statsOverview" aria-label="Progress overview">
      <div class="statsTop"><span>Progress overview</span><strong id="progressPct">0%</strong></div>
      <div class="progress"><span id="progressBar"></span></div>
      <div class="statsGrid">
        <div><span>Total</span><strong id="totalCount">0</strong></div>
        <div><span>Watched</span><strong id="watchedCount">0</strong></div>
        <div><span>Remaining</span><strong id="remainingCount">0</strong></div>
        <div><span>Current view</span><strong id="currentViewCount">0</strong></div>
      </div>
      <p id="progressDetail" class="small">Loading progress…</p>
      <p id="syncStatus" class="small syncStatusInline">Ready.</p>
    </aside>
  </section>

  <section class="showStrip" id="showStrip"></section>

  <section class="controls card">
    <input id="searchBox" placeholder="Search title, show, notes…" autocomplete="off">
    <select id="showFilter"><option value="">All shows</option></select>
    <select id="franchiseFilter"><option value="">All franchises</option></select>
    <select id="actorFilter"><option value="">All regular actors</option></select>
    <select id="seasonFilter"><option value="">All seasons</option></select>
    <select id="scopeFilter" aria-label="Guide scope">
      <option value="core">Core Wolf Universe</option>
      <option value="connected" selected>Core + Crossover Relevant</option>
      <option value="adjacent">Adjacent / Archive Only</option>
      <option value="complete">Complete Dick Wolf Universe</option>
    </select>
    <select id="statusFilter">
      <option value="unwatched">Only unwatched</option>
      <option value="all">Show all</option>
      <option value="watched">Only watched</option>
      <option value="watching">Watching</option>
      <option value="skipped">Skipped</option>
    </select>
    <label class="toggle"><input type="checkbox" id="hideWatched" checked> Hide watched</label>
  </section>


  <section class="actions card">
    <button id="exportJson">Export Status JSON</button><label class="fileBtn">Import Status JSON<input id="importJson" type="file" accept="application/json"></label><button id="exportCsv">Export Current View CSV</button><button id="installBtn">Install app</button><button id="resetFilters" class="ghost">Reset filters</button>
  </section>

  <main id="episodeList" class="episodeList"></main>
  </div>
  <div id="toastHost" class="toastHost" aria-live="polite"></div>
  <div id="modalOverlay" class="modalOverlay" role="dialog" aria-modal="true"></div>
  <div id="episodeModalOverlay" class="episodeModalOverlay" aria-modal="true" role="dialog"></div>
  <div id="lightboxOverlay" class="lightboxOverlay" aria-modal="true" role="dialog"></div>
  <nav class="bottomNav"><button data-status="unwatched">Unwatched</button><button data-status="all">All</button><button data-status="watched">Watched</button><button id="bottomNext">Next</button></nav>
  <script src="data/show_themes.js"></script><script src="data/wolf_artwork.js"></script><script src="data/wolf_cast_index.js"></script><script src="data/episodes.js"></script><script src="app.js"></script>
</body>
</html>
