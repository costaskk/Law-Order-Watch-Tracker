name: Optional shared Trakt status sync

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: trakt-status-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Validate secrets
        run: |
          test -n "${{ secrets.TRAKT_CLIENT_ID }}" || (echo "Missing TRAKT_CLIENT_ID" && exit 1)
          test -n "${{ secrets.TRAKT_CLIENT_SECRET }}" || (echo "Missing TRAKT_CLIENT_SECRET" && exit 1)
          test -n "${{ secrets.TRAKT_TOKEN_JSON }}" || (echo "Missing TRAKT_TOKEN_JSON" && exit 1)
      - name: Write temporary credentials
        env:
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TRAKT_CLIENT_SECRET: ${{ secrets.TRAKT_CLIENT_SECRET }}
          TRAKT_TOKEN_JSON: ${{ secrets.TRAKT_TOKEN_JSON }}
        run: |
          python - <<'PY'
          import json, os
          open('trakt_config.json','w',encoding='utf-8').write(json.dumps({
            'client_id': os.environ['TRAKT_CLIENT_ID'],
            'client_secret': os.environ['TRAKT_CLIENT_SECRET']
          }))
          open('trakt_token.json','w',encoding='utf-8').write(os.environ['TRAKT_TOKEN_JSON'])
          PY
      - name: Build full-guide shared status
        run: python sync_trakt_and_excel.py
      - name: Remove temporary credentials
        if: always()
        run: rm -f trakt_config.json trakt_token.json
      - name: Commit only if status changed
        run: |
          git config user.name "wolf-trakt-bot"
          git config user.email "actions@users.noreply.github.com"
          git add law_order_tracker_app/data/watched_status.json law_order_watch_status_from_trakt.json law_order_tracker_app/data/trakt_sync_debug.json
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "Update optional shared Trakt status"
          git pull --rebase --autostash origin main
          git push origin HEAD:main
