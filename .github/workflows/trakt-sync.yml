name: Trakt status sync

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: trakt-status-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests openpyxl

      - name: Write Trakt config/token
        run: |
          printf '%s' '{"client_id":"${{ secrets.TRAKT_CLIENT_ID }}","client_secret":"${{ secrets.TRAKT_CLIENT_SECRET }}"}' > trakt_config.json
          printf '%s' '${{ secrets.TRAKT_TOKEN_JSON }}' > trakt_token.json

      - name: Sync Trakt
        run: python sync_trakt_and_excel.py

      - name: Remove private temp files
        run: |
          rm -f trakt_config.json trakt_token.json

      - name: Commit and push updates
        run: |
          git config user.name "law-order-trakt-bot"
          git config user.email "actions@users.noreply.github.com"

          git add law_order_tracker_app/data/watched_status.json || true
          git add Law_Order_Professional_Watch_Tracker_Trakt_Synced.xlsx || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update Trakt watched status"
          git push origin HEAD:main